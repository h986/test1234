<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #333;
            color: white;
        }
        .brand {
            font-size: 1.5em;
        }

        /* NEW: nav spacing + link styling */
        nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
        }
        nav a:visited {
            color: white;
        }
        nav a:hover {
            text-decoration: underline;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .hamburger {
            width: 25px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }
        .hamburger div {
            height: 3px;
            background-color: white;
        }
        .content {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        .content h1 {
            text-align: center;
            font-size: 2em;
        }
        .content p {
            text-align: justify;
        }
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            .brand {
                margin-bottom: 10px;
            }
            .hamburger {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">Henry B. Cottom</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
    </nav>
</header>

<div class="content">
    <h1>Welcome to My Portfolio</h1>
    <p>This is the home page of my website. You can navigate to different sections using the menu at the top right side of this page.</p>
    
</div>

</body>
</html>
